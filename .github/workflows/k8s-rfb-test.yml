name: Test RFB Protocol

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Test RFB protocol with python
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "Pod: $POD"

          cat > /tmp/rfb_test.py << 'PYEOF'
          import socket, time

          print("=== Test 1: Direct TCP, no initial data (expect deadlock) ===")
          s1 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s1.settimeout(3)
          s1.connect(("127.0.0.1", 5900))
          print("Connected to 5900")
          try:
              data = s1.recv(100)
              print(f"Got {len(data)} bytes: {data!r}")
          except socket.timeout:
              print("TIMEOUT after 3s - deadlock confirmed (server waiting for peek)")
          s1.close()

          time.sleep(1)

          print("\n=== Test 2: Send RFB version first (expect server version back) ===")
          s2 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s2.settimeout(5)
          s2.connect(("127.0.0.1", 5900))
          print("Connected to 5900")
          rfb_version = b"RFB 003.008\n"
          print(f"Sending: {rfb_version!r} ({len(rfb_version)} bytes)")
          s2.sendall(rfb_version)
          print("Sent RFB version, waiting for response...")
          try:
              data = s2.recv(200)
              print(f"Got {len(data)} bytes: {data!r}")
              print(f"Hex: {data.hex()}")
              if data.startswith(b"RFB"):
                  print("SUCCESS: Server responded with RFB version!")
              else:
                  print(f"WARNING: Server responded but not with RFB version. First 4 bytes: {data[:4]!r}")
          except socket.timeout:
              print("TIMEOUT after 5s - RFB injection did NOT break deadlock!")
          s2.close()

          time.sleep(1)

          print("\n=== Test 3: Send just 'R' then wait (check MSG_PEEK behavior) ===")
          s3 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s3.settimeout(5)
          s3.connect(("127.0.0.1", 5900))
          print("Connected to 5900")
          s3.sendall(b"R")
          print("Sent single byte 'R', waiting 5s for response...")
          try:
              data = s3.recv(200)
              print(f"Got {len(data)} bytes: {data!r}")
          except socket.timeout:
              print("TIMEOUT - single byte not enough to trigger MSG_PEEK decision")
          s3.close()
          PYEOF

          kubectl cp /tmp/rfb_test.py "$POD":/tmp/rfb_test.py -n hanzo -c operative
          kubectl exec "$POD" -n hanzo -c operative -- timeout 30 python3 /tmp/rfb_test.py 2>&1

      - name: Check x11vnc process and version
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "=== x11vnc process ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep x11vnc | grep -v grep' 2>&1
          echo "=== x11vnc version ==="
          kubectl exec "$POD" -n hanzo -c operative -- x11vnc -version 2>&1 | head -3
          echo "=== x11vnc stderr log ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'tail -30 /tmp/x11vnc_stderr.log 2>/dev/null || echo "no log file"' 2>&1
