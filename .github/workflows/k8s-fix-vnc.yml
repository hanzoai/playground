name: Fix VNC in Running Pods

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  fix-vnc:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check process list in operative containers
        run: |
          echo "=== Finding all agent pods with operative sidecar ==="
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          if [ -z "$PODS" ]; then
            echo "No agent pods found"
            exit 0
          fi
          echo "Agent pods: $PODS"
          echo ""

          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi

            echo "=== Processes in $POD operative container ==="
            kubectl exec "$POD" -n hanzo -c operative -- ps aux 2>/dev/null || echo "  ps failed"
            echo ""
            echo "=== Port 5900 status in $POD ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ss -tlnp 2>/dev/null | grep 5900 || echo "not listening"' 2>/dev/null || echo "  exec failed"
            echo ""
          done

      - name: Kill x11vnc (using PID file, not pkill with string match)
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi

            echo "=== Killing x11vnc in $POD ==="
            # Use pgrep to find the PID, then kill by PID — avoids pkill matching our own shell
            kubectl exec "$POD" -n hanzo -c operative -- sh -c \
              'PID=$(pgrep -x x11vnc 2>/dev/null); if [ -n "$PID" ]; then kill $PID; echo "killed x11vnc PID $PID"; else echo "x11vnc not running"; fi' \
              2>/dev/null || echo "  exec failed for $POD"
            echo ""
          done

      - name: Start x11vnc with fixed flags
        run: |
          sleep 2
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi

            echo "=== Starting fixed x11vnc in $POD ==="
            # Start x11vnc with -nolookup (prevents DNS hang) and -noxdamage (prevents CPU spin)
            # Write a startup script then execute it to avoid shell command-line matching issues
            kubectl exec "$POD" -n hanzo -c operative -- sh -c \
              'cat > /tmp/start_vnc.sh << '"'"'SCRIPT'"'"'
#!/bin/sh
exec x11vnc -display :1 -forever -shared -wait 200 -rfbport 5900 -nopw -nolookup -noxdamage -nap >> /tmp/x11vnc_fixed.log 2>&1
SCRIPT
chmod +x /tmp/start_vnc.sh
nohup /tmp/start_vnc.sh &
echo "x11vnc started with PID $!"' \
              2>/dev/null && echo "  Done: x11vnc started in $POD" \
              || echo "  Warning: exec failed for $POD"
            echo ""
          done

      - name: Verify x11vnc listening
        run: |
          sleep 5
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi

            echo "=== Verifying $POD ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c \
              'ss -tlnp 2>/dev/null | grep 5900 && echo "OK: port 5900 listening" || echo "FAIL: port 5900 not found"' \
              2>/dev/null || echo "  exec failed"
            echo "  x11vnc log:"
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'tail -5 /tmp/x11vnc_fixed.log 2>/dev/null || echo "no log"' \
              2>/dev/null || echo "  log read failed"
            echo ""
          done
