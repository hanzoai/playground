name: Fix VNC in Running Pods

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  fix-vnc:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check process list in operative containers
        run: |
          echo "=== Finding all agent pods with operative sidecar ==="
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          if [ -z "$PODS" ]; then
            echo "No agent pods found"
            exit 0
          fi
          echo "Agent pods: $PODS"

          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi
            echo "=== Processes in $POD operative container ==="
            kubectl exec "$POD" -n hanzo -c operative -- ps aux 2>/dev/null || echo "  ps failed"
            echo "=== Port 5900 status ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ss -tlnp 2>/dev/null | grep 5900 || echo "not listening on 5900"' 2>/dev/null || true
          done

      - name: Kill x11vnc by exact PID (avoid self-matching)
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi
            echo "=== Killing x11vnc in $POD ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'PID=$(pgrep -x x11vnc 2>/dev/null); if [ -n "$PID" ]; then kill "$PID" 2>/dev/null && echo "killed x11vnc PID $PID"; else echo "x11vnc not running (pgrep found nothing)"; fi' 2>/dev/null || echo "exec failed for $POD"
          done

      - name: Start x11vnc with fixed flags
        run: |
          sleep 2
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi
            echo "=== Starting fixed x11vnc in $POD ==="
            # Use printf to write the script (no heredoc) then run it in background
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'printf "#!/bin/sh\nexec x11vnc -display :1 -forever -shared -wait 200 -rfbport 5900 -nopw -nolookup -noxdamage -nap\n" > /tmp/vnc_start.sh && chmod +x /tmp/vnc_start.sh && nohup /tmp/vnc_start.sh >> /tmp/x11vnc_fixed.log 2>&1 & echo "started PID $!"' 2>/dev/null && echo "done" || echo "exec failed for $POD"
          done

      - name: Verify x11vnc listening
        run: |
          sleep 5
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi
            echo "=== Verifying x11vnc in $POD ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ss -tlnp 2>/dev/null | grep 5900 && echo "OK: port 5900 listening" || echo "FAIL: not listening"' 2>/dev/null || echo "exec failed"
            echo "  Last 5 lines of x11vnc log:"
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'tail -5 /tmp/x11vnc_fixed.log 2>/dev/null || echo "no log yet"' 2>/dev/null || true
          done
