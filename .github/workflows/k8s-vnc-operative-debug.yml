name: Debug VNC Operative Container

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check operative x11vnc processes and port
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi
            echo "=== $POD operative: x11vnc status ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep -i vnc' 2>/dev/null || echo "exec failed"
            echo ""
            echo "=== $POD operative: port 5900 listeners ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ss -tlnp 2>/dev/null | grep 5900 || netstat -tlnp 2>/dev/null | grep 5900 || echo "no listener on 5900"' 2>/dev/null || true
            echo ""
            echo "=== $POD operative: test VNC handshake ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'echo "" | timeout 2 nc -w2 127.0.0.1 5900 2>&1 | head -c 100 || echo "nc failed or timed out"' 2>/dev/null || true
            echo ""
            echo "=== $POD operative: last 30 lines of logs ==="
            kubectl logs "$POD" -n hanzo -c operative --tail=30 2>/dev/null || echo "no logs"
            echo ""
          done

      - name: Test VNC from agent container (cross-container)
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            echo "=== $POD agent: test TCP to 127.0.0.1:5900 ==="
            kubectl exec "$POD" -n hanzo -c agent -- sh -c 'echo "" | timeout 2 nc -w2 127.0.0.1 5900 2>&1 | head -c 100 || echo "nc failed"' 2>/dev/null || true
            echo ""
            echo "=== $POD agent: latest VNC tunnel logs ==="
            kubectl logs "$POD" -n hanzo -c agent --tail=50 2>/dev/null | grep -i "vnc" || echo "no vnc logs"
            echo ""
          done

      - name: Gateway VNC tunnel logs (latest)
        run: |
          GWPOD=$(kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{.items[0].metadata.name}')
          echo "=== Gateway VNC logs ==="
          kubectl logs "$GWPOD" -n hanzo --tail=100 2>/dev/null | grep -i "vnc" || echo "no vnc logs"
