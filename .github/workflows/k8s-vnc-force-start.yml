name: Force Start x11vnc

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Debug and force-start x11vnc
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi
            echo "=== $POD ==="

            echo "1. All processes:"
            kubectl exec "$POD" -n hanzo -c operative -- ps aux 2>/dev/null || echo "ps failed"
            echo ""

            echo "2. Startup script content:"
            kubectl exec "$POD" -n hanzo -c operative -- cat /home/operative/.operative/x11vnc_startup.sh 2>/dev/null || echo "not found"
            echo ""

            echo "3. x11vnc stderr log:"
            kubectl exec "$POD" -n hanzo -c operative -- cat /tmp/x11vnc_stderr.log 2>/dev/null || echo "no log"
            echo ""

            echo "4. DISPLAY and X server check:"
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'echo "DISPLAY=$DISPLAY"; ls -la /tmp/.X*-lock 2>/dev/null || echo "no X lock"; DISPLAY=:1 xdpyinfo 2>&1 | head -5 || echo "xdpyinfo failed"' 2>/dev/null || echo "exec failed"
            echo ""

            echo "5. Force starting x11vnc with -nowsock -nap..."
            kubectl exec "$POD" -n hanzo -c operative -- sh -c '
              # Kill any existing
              pkill -x x11vnc 2>/dev/null || true
              sleep 1
              # Start directly with correct flags
              x11vnc -display :1 -forever -shared -wait 50 -rfbport 5900 -nopw -nolookup -noxdamage -nap -nowsock </dev/null >/dev/null 2>/tmp/x11vnc_stderr.log &
              echo "Started PID $!"
              sleep 3
            ' 2>/dev/null || echo "start failed"

            echo "6. Verify running:"
            kubectl exec "$POD" -n hanzo -c operative -- pgrep -xa x11vnc 2>/dev/null || echo "not running"
            echo ""

            echo "7. Port 5900:"
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ss -tlnp | grep 5900' 2>/dev/null || echo "not listening"
            echo ""
          done
