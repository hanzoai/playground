name: Force Start x11vnc

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Fix startup script and force-start x11vnc
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi
            echo "=== $POD ==="

            echo "1. Remove invalid -nowsock from startup script..."
            kubectl exec "$POD" -n hanzo -c operative -- sh -c '
              SCRIPT=/home/operative/.operative/x11vnc_startup.sh
              # Remove -nowsock (invalid flag that crashes x11vnc)
              sed -i "s/ -nowsock//g" "$SCRIPT" 2>/dev/null
              # Ensure -nap -nolookup -noxdamage are present
              if ! grep -q "\-nap" "$SCRIPT" 2>/dev/null; then
                sed -i "s/-nopw/-nopw -nolookup -noxdamage -nap/" "$SCRIPT" 2>/dev/null
              fi
              echo "Script now:"
              cat "$SCRIPT"
            ' 2>/dev/null || echo "patch failed"
            echo ""

            echo "2. Kill any existing x11vnc and start fresh..."
            kubectl exec "$POD" -n hanzo -c operative -- sh -c '
              pkill -x x11vnc 2>/dev/null || true
              sleep 1
              # Start with valid flags only (no -nowsock!)
              x11vnc -display :1 -forever -shared -wait 50 -rfbport 5900 -nopw -nolookup -noxdamage -nap </dev/null >/dev/null 2>/tmp/x11vnc_stderr.log &
              echo "Started PID $!"
              sleep 3
            ' 2>/dev/null || echo "start failed"

            echo "3. Verify running:"
            kubectl exec "$POD" -n hanzo -c operative -- pgrep -xa x11vnc 2>/dev/null || echo "not running"

            echo "4. Port 5900:"
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ss -tlnp | grep 5900' 2>/dev/null || echo "not listening"

            echo "5. CPU usage:"
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep x11vnc | grep -v grep' 2>/dev/null || echo "failed"

            echo "6. VNC handshake test (should show RFB banner):"
            kubectl exec "$POD" -n hanzo -c operative -- sh -c '
              timeout 3 bash -c "exec 3<>/dev/tcp/127.0.0.1/5900; cat <&3 & sleep 1; kill %1 2>/dev/null" 2>/dev/null || echo "handshake failed"
            ' 2>/dev/null || echo "exec failed"
            echo ""
          done
