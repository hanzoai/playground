name: VNC Deep Debug
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: ALL agent container logs (no tail limit)
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "=== Full agent logs for $POD ==="
          kubectl logs "$POD" -n hanzo -c agent 2>/dev/null | grep -i "vnc\|tunnel\|warn\|error\|invoke\|rewrite" || echo "No matches"
      - name: Check if rewriteTunnelUrl exists in image
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "=== Checking for rewriteTunnelUrl in bot code ==="
          kubectl exec "$POD" -n hanzo -c agent -- sh -c 'grep -r "rewriteTunnelUrl" /app/dist/ 2>/dev/null | head -5 || echo "not found in /app/dist"' || echo "exec failed"
          kubectl exec "$POD" -n hanzo -c agent -- sh -c 'grep -r "rewriteTunnelUrl" /app/src/ 2>/dev/null | head -5 || echo "not found in /app/src"' || echo "exec failed"
      - name: Check VNC module exists
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "=== Check invoke-vnc module ==="
          kubectl exec "$POD" -n hanzo -c agent -- sh -c 'ls -la /app/dist/node-host/invoke-vnc* 2>/dev/null || echo "no invoke-vnc in dist"' || echo "exec failed"
          kubectl exec "$POD" -n hanzo -c agent -- sh -c 'cat /app/dist/node-host/invoke-vnc.js 2>/dev/null | head -30 || echo "cannot read file"' || echo "exec failed"
      - name: Check node commands registration
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "=== Full agent logs: all lines ==="
          kubectl logs "$POD" -n hanzo -c agent 2>/dev/null | head -50
      - name: Gateway logs - search for VNC
        run: |
          GWPOD=$(kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{.items[0].metadata.name}')
          echo "=== Gateway full logs: VNC/tunnel related ==="
          kubectl logs "$GWPOD" -n hanzo 2>/dev/null | grep -i "vnc\|tunnel\|404\|upgrade" || echo "no matches"
      - name: Test internal VNC connectivity from agent
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "=== Test TCP to operative:5900 from agent container ==="
          kubectl exec "$POD" -n hanzo -c agent -- sh -c 'timeout 3 sh -c "echo | nc -w 2 127.0.0.1 5900" 2>&1 || echo "connection failed"' || echo "exec/nc failed"
