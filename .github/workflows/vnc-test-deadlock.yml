name: Test VNC Deadlock

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Direct TCP test
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "Pod: $POD"
          echo "Direct TCP to 5900 wait 5s:"
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'timeout 5 bash -c "exec 3<>/dev/tcp/127.0.0.1/5900; cat <&3" 2>/dev/null | xxd | head -5 || echo "DEADLOCK no data in 5s"'

      - name: Send RFB version first
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "Send RFB version to 5900:"
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'timeout 8 bash -c "exec 3<>/dev/tcp/127.0.0.1/5900; printf \"RFB 003.008\n\" >&3; head -c 200 <&3" 2>/dev/null | xxd | head -10 || echo "no response"'

      - name: Websockify data flow
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "Testing websockify data flow via python:"
          kubectl exec "$POD" -n hanzo -c operative -- timeout 25 python3 << 'PYEOF'
import socket, time, os, base64
s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
s.settimeout(5)
s.connect(("127.0.0.1", 6080))
key = base64.b64encode(os.urandom(16)).decode()
req = f"GET / HTTP/1.1\r\nHost: 127.0.0.1:6080\r\nUpgrade: websocket\r\nConnection: Upgrade\r\nSec-WebSocket-Key: {key}\r\nSec-WebSocket-Version: 13\r\n\r\n".encode()
s.sendall(req)
resp = b""
while True:
    chunk = s.recv(4096)
    resp += chunk
    if b"\r\n\r\n" in resp:
        break
print("WS upgrade:", resp.decode("utf-8", errors="replace").strip())
print("Waiting 15s for VNC data from websockify...")
s.settimeout(15)
try:
    frame = s.recv(4096)
    print(f"Got: {len(frame)} bytes hex={frame[:30].hex()}")
except socket.timeout:
    print("DEADLOCK CONFIRMED: No VNC data via websockify in 15s")
s.close()
PYEOF

      - name: x11vnc info
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep x11vnc | grep -v grep; echo "---"; x11vnc -version 2>&1 | head -3; echo "---"; dpkg -l 2>/dev/null | grep -i "libvnc\|x11vnc" || echo "no packages"'

      - name: Alt VNC servers
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'which Xvnc 2>/dev/null && echo "Xvnc found" || echo "Xvnc not found"; which vncserver 2>/dev/null && echo "vncserver found" || echo "vncserver not found"'

      - name: x11vnc stderr
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'tail -20 /tmp/x11vnc_stderr.log 2>/dev/null || echo "no log"'
