name: Debug Gateway Connection

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug-gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Find gateway pods
        run: |
          echo "=== All pods with 'gateway' in name ==="
          kubectl get pods -n hanzo | grep -i gateway || echo "No gateway pods found by name"
          echo ""
          echo "=== All deployments ==="
          kubectl get deployments -n hanzo | head -20
          echo ""
          echo "=== All services ==="
          kubectl get svc -n hanzo | head -20

      - name: Gateway pod details
        run: |
          POD=$(kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -z "$POD" ]; then
            echo "Trying broader search..."
            POD=$(kubectl get pods -n hanzo -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -i gateway | head -1)
          fi
          if [ -z "$POD" ]; then
            echo "No gateway pod found! Listing all pods:"
            kubectl get pods -n hanzo
            exit 1
          fi
          echo "Gateway pod: $POD"
          echo ""
          echo "=== Pod describe ==="
          kubectl describe pod "$POD" -n hanzo | head -80
          echo ""
          echo "=== Pod status ==="
          kubectl get pod "$POD" -n hanzo -o wide

      - name: Gateway container logs (last 200 lines)
        run: |
          POD=$(kubectl get pods -n hanzo -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -i gateway | head -1)
          echo "=== Gateway logs (last 200 lines) ==="
          kubectl logs "$POD" -n hanzo --tail=200 2>&1

      - name: Gateway error logs
        run: |
          POD=$(kubectl get pods -n hanzo -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -i gateway | head -1)
          echo "=== Error/warning/reject/auth lines ==="
          kubectl logs "$POD" -n hanzo --tail=1000 2>&1 | grep -iE "error|fail|reject|auth|origin|connect|disconnect|close|refused|unauthorized|forbidden" | tail -50 || echo "No matching lines"

      - name: Gateway config check
        run: |
          POD=$(kubectl get pods -n hanzo -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -i gateway | head -1)
          echo "=== Gateway config file ==="
          kubectl exec "$POD" -n hanzo -- cat /etc/bot/bot.json 2>&1 || echo "Config file not found"
          echo ""
          echo "=== Environment variables (non-secret) ==="
          kubectl exec "$POD" -n hanzo -- sh -c 'env | grep -iE "BOT_|GATEWAY|NODE|PORT|HOST" | sort' 2>&1 || echo "env check failed"

      - name: Test WebSocket handshake from inside cluster
        run: |
          POD=$(kubectl get pods -n hanzo -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -i gateway | head -1)
          echo "=== Test WS connection to gateway service ==="
          kubectl exec "$POD" -n hanzo -- sh -c '
            if command -v curl >/dev/null 2>&1; then
              echo "Testing HTTP upgrade..."
              curl -v --max-time 5 \
                -H "Upgrade: websocket" \
                -H "Connection: Upgrade" \
                -H "Sec-WebSocket-Version: 13" \
                -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
                -H "Origin: https://hanzo.bot" \
                "http://localhost:18789/" 2>&1 || echo "curl failed"
            else
              echo "curl not available"
            fi
          ' 2>&1

      - name: Check gateway ingress/routing
        run: |
          echo "=== Ingress rules ==="
          kubectl get ingress -n hanzo 2>&1 | head -20
          echo ""
          echo "=== Ingress details for gateway ==="
          kubectl get ingress -n hanzo -o yaml 2>&1 | grep -A 20 "gw.hanzo.bot" || echo "No gw.hanzo.bot ingress found"
