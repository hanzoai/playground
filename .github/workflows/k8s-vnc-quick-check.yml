name: VNC Quick Check

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Agent container logs (last 100 vnc/tunnel/invoke)
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            echo "=== $POD agent container: vnc/tunnel/invoke logs ==="
            kubectl logs "$POD" -n hanzo -c agent --tail=200 2>/dev/null | grep -i "vnc\|tunnel\|invoke" || echo "  no matching logs"
            echo ""
            echo "=== $POD agent container: last 30 lines ==="
            kubectl logs "$POD" -n hanzo -c agent --tail=30 2>/dev/null || echo "  failed"
            echo ""
          done

      - name: Gateway logs (last 100 vnc/tunnel)
        run: |
          GWPOD=$(kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$GWPOD" ]; then
            echo "=== Gateway: vnc/tunnel logs ==="
            kubectl logs "$GWPOD" -n hanzo --tail=300 2>/dev/null | grep -i "vnc\|tunnel" || echo "  no vnc-related gateway logs"
          fi

      - name: Env vars and x11vnc status
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            echo "=== $POD: agent env vars ==="
            kubectl exec "$POD" -n hanzo -c agent -- sh -c 'echo "BOT_NODE_GATEWAY_URL=$BOT_NODE_GATEWAY_URL"; echo "BOT_CLOUD_NODE=$BOT_CLOUD_NODE"; echo "AGENT_NODE_ID=$AGENT_NODE_ID"' 2>/dev/null || echo "exec failed"
            echo ""
            echo "=== $POD: x11vnc status ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'pgrep -xa x11vnc 2>/dev/null || echo "not running"; ss -tlnp 2>/dev/null | grep 5900 || echo "5900 not listening"' 2>/dev/null || echo "exec failed"
            echo ""
          done
