name: VNC X11 Debug

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check X server and x11vnc state
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          echo "Pod: $POD"
          echo ""

          echo "=== x11vnc process ==="
          kubectl exec "$POD" -n hanzo -c operative -- pgrep -xa x11vnc 2>/dev/null || echo "not running"
          echo ""

          echo "=== x11vnc CPU usage ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep x11vnc | grep -v grep' 2>/dev/null || echo "failed"
          echo ""

          echo "=== Xvfb/X server process ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep -E "Xvfb|Xvnc|Xorg|Xtigervnc" | grep -v grep || echo "no X server found"' 2>/dev/null || echo "exec failed"
          echo ""

          echo "=== All processes in operative container ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux 2>/dev/null || ps -ef 2>/dev/null || echo "ps failed"' 2>/dev/null || echo "exec failed"
          echo ""

          echo "=== x11vnc stderr log ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'cat /tmp/x11vnc_stderr.log 2>/dev/null || echo "no stderr log"' 2>/dev/null || echo "exec failed"
          echo ""

          echo "=== x11vnc startup script content ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'cat /home/operative/.operative/x11vnc_startup.sh 2>/dev/null || echo "not found"' 2>/dev/null || echo "exec failed"
          echo ""

          echo "=== DISPLAY env var ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'echo "DISPLAY=$DISPLAY"' 2>/dev/null || echo "exec failed"
          echo ""

          echo "=== Check /tmp/.X1-lock ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ls -la /tmp/.X*-lock 2>/dev/null || echo "no X lock files"' 2>/dev/null || echo "exec failed"
          echo ""

          echo "=== xdpyinfo test on :1 ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'DISPLAY=:1 xdpyinfo 2>&1 | head -20 || echo "xdpyinfo failed"' 2>/dev/null || echo "exec failed"
          echo ""

          echo "=== websockify / noVNC processes ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep -E "websockify|novnc|6080" | grep -v grep || echo "no websockify found"' 2>/dev/null || echo "exec failed"
          echo ""

          echo "=== Listening ports ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || echo "failed"' 2>/dev/null || echo "exec failed"
