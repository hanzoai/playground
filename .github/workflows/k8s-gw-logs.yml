name: Check Gateway & Agent VNC Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  logs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Gateway VNC logs
        run: |
          echo "=== Gateway pod ==="
          GW=$(kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "not-found")
          echo "Gateway pod: $GW"
          if [ "$GW" != "not-found" ]; then
            echo "=== Last 100 lines with vnc ==="
            kubectl logs "$GW" -n hanzo --tail=100 2>&1 | grep -i "vnc\|tunnel" || echo "no vnc lines"
          fi

      - name: Agent container logs for new node
        run: |
          echo "=== Agent pods ==="
          kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o wide 2>&1
          echo ""
          echo "=== Looking for cloud-f69b505e agent logs ==="
          for POD in $(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- Pod: $POD ---"
            kubectl logs "$POD" -n hanzo -c agent --tail=50 2>&1 | grep -i "vnc\|tunnel\|tcp\|rfb\|deadlock" || echo "no vnc lines"
          done

      - name: Check x11vnc status in operative
        run: |
          for POD in $(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- Pod: $POD operative ---"
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep x11vnc | grep -v grep; echo "---"; ss -tlnp | grep -E "5900|6080" || netstat -tlnp 2>/dev/null | grep -E "5900|6080"' 2>&1 || echo "exec failed"
          done

      - name: Test RFB injection from inside pod
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "Pod: $POD"
          echo "=== Send RFB version to 5900, expect server response ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'timeout 5 bash -c "exec 3<>/dev/tcp/127.0.0.1/5900; printf \"RFB 003.008\n\" >&3; head -c 100 <&3" 2>/dev/null | xxd | head -10 || echo "no response or timeout"'
