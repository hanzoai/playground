name: Patch Live VNC

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Patch x11vnc startup and restart
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi
            echo "=== $POD: patching x11vnc_startup.sh ==="
            # Patch the startup script to add -nolookup -noxdamage
            kubectl exec "$POD" -n hanzo -c operative -- sed -i 's/-nopw/-nopw -nolookup -noxdamage/' /home/operative/.operative/x11vnc_startup.sh 2>/dev/null || echo "sed failed"
            echo "Patched startup script"
            # Kill x11vnc — the monitor loop will restart with patched flags
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'PID=$(pgrep -x x11vnc); [ -n "$PID" ] && kill "$PID" && echo "Killed x11vnc PID $PID" || echo "No x11vnc to kill"' 2>/dev/null || true
            echo "Waiting 8s for restart..."
            sleep 8
            echo "=== $POD: verify ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c '
              echo "processes:"; ps aux | grep x11vnc | grep -v grep || echo "  none"
              echo "port 5900:"; ss -tlnp 2>/dev/null | grep 5900 || echo "  no listener"
              echo "VNC handshake (hex):"; (echo "" | timeout 2 nc -w1 127.0.0.1 5900 | xxd | head -3) 2>/dev/null || echo "  nc failed"
              echo "startup script flags:"; grep nolookup /home/operative/.operative/x11vnc_startup.sh || echo "  nolookup not found"
            ' 2>/dev/null || echo "verify failed"
          done
