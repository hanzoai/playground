name: Install TigerVNC and Test (Hotfix)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  hotfix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Install TigerVNC, replace x11vnc, test
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "Pod: $POD"

          echo "=== Step 1: Install tigervnc-scraping-server ==="
          kubectl exec "$POD" -n hanzo -c operative -- sudo apt-get update -qq 2>&1 | tail -3
          kubectl exec "$POD" -n hanzo -c operative -- sudo apt-get install -y -qq tigervnc-scraping-server 2>&1 | tail -5
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'which x0vncserver && x0vncserver --version 2>&1 | head -2' 2>&1

          echo ""
          echo "=== Step 2: Kill x11vnc and start x0vncserver ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c '
            # Kill x11vnc and its monitor
            killall -9 x11vnc 2>/dev/null
            # Kill the startup script monitor loop
            for PID in $(pgrep -f x11vnc_startup); do kill -9 $PID 2>/dev/null; done
            sleep 1
            echo "Killed x11vnc and monitor"

            # Start x0vncserver
            x0vncserver -display :1 -rfbport 5900 -SecurityTypes None &
            VNC_PID=$!
            sleep 2

            if kill -0 $VNC_PID 2>/dev/null; then
              echo "x0vncserver running (PID=$VNC_PID)"
              ps aux | grep x0vnc | grep -v grep
            else
              echo "FAILED: x0vncserver not running"
              exit 1
            fi
          ' 2>&1

          echo ""
          echo "=== Step 3: Test RFB protocol ==="
          cat > /tmp/tigervnc_test.py << 'PYEOF'
          import socket, time

          print("Test A: Connect and wait for server banner (normal RFB)...")
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.settimeout(5)
          try:
              s.connect(("127.0.0.1", 5900))
              print("Connected to :5900")
              data = s.recv(100)
              print(f"Got {len(data)} bytes: {data!r}")
              if data.startswith(b"RFB"):
                  print("SUCCESS! Server sent RFB version immediately!")
                  # Continue the handshake
                  s.sendall(b"RFB 003.008\n")
                  print("Sent client RFB version")
                  # Should get security types
                  sec = s.recv(200)
                  print(f"Security types: {len(sec)} bytes, hex={sec.hex()}")
                  if len(sec) > 0:
                      print("FULL SUCCESS: VNC handshake works!")
              else:
                  print(f"Unexpected: {data[:20].hex()}")
          except socket.timeout:
              print("TIMEOUT (deadlock still present)")
          except Exception as e:
              print(f"ERROR: {e}")
          s.close()

          time.sleep(1)

          print("\nTest B: websockify:6080 → x0vncserver:5900...")
          import base64, os, struct
          s2 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s2.settimeout(10)
          try:
              s2.connect(("127.0.0.1", 6080))
              key = base64.b64encode(os.urandom(16)).decode()
              upgrade = (
                  "GET / HTTP/1.1\r\n"
                  f"Host: 127.0.0.1:6080\r\n"
                  "Upgrade: websocket\r\n"
                  "Connection: Upgrade\r\n"
                  f"Sec-WebSocket-Key: {key}\r\n"
                  "Sec-WebSocket-Version: 13\r\n"
                  "\r\n"
              )
              s2.sendall(upgrade.encode())
              resp = b""
              while True:
                  chunk = s2.recv(4096)
                  if not chunk: break
                  resp += chunk
                  if b"\r\n\r\n" in resp: break

              if b"101" not in resp:
                  print(f"websockify upgrade failed: {resp.decode('utf-8', errors='replace')[:200]}")
              else:
                  print("websockify WS upgrade OK")
                  s2.settimeout(5)
                  frame = s2.recv(4096)
                  print(f"Got WS frame: {len(frame)} bytes, hex={frame[:40].hex()}")
                  if len(frame) >= 2:
                      opcode = frame[0] & 0x0f
                      length = frame[1] & 0x7f
                      ps = 2
                      payload = frame[ps:ps+length]
                      print(f"opcode={opcode} payload={payload!r}")
                      if b"RFB" in payload:
                          print("FULL SUCCESS: x0vncserver sends RFB through websockify!")
          except socket.timeout:
              print("TIMEOUT waiting for data through websockify")
          except Exception as e:
              print(f"ERROR: {e}")
          s2.close()

          print("\nTest C: x0vncserver CPU usage...")
          import subprocess
          r = subprocess.run(["ps", "aux"], capture_output=True, text=True)
          for line in r.stdout.split("\n"):
              if "x0vnc" in line and "grep" not in line:
                  print(line)
          PYEOF

          kubectl cp /tmp/tigervnc_test.py "$POD":/tmp/tigervnc_test.py -n hanzo -c operative
          kubectl exec "$POD" -n hanzo -c operative -- timeout 30 python3 /tmp/tigervnc_test.py 2>&1
