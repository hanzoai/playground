name: VNC Detailed Debug

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Pod and container info
        run: |
          echo "=== Agent pods ==="
          kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o wide 2>/dev/null || echo "No agent pods"
          echo ""
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            echo "=== $POD containers ==="
            kubectl get pod "$POD" -n hanzo -o jsonpath='{range .spec.containers[*]}{.name}: {.image}{"\n"}{end}' 2>/dev/null
            echo ""
          done

      - name: Node-host ALL logs (agent container, last 200 lines)
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            echo "=== $POD agent container logs (vnc/tunnel/invoke related) ==="
            kubectl logs "$POD" -n hanzo -c agent --tail=200 2>/dev/null | grep -i "vnc\|tunnel\|invoke\|BOT_NODE_GATEWAY\|error\|warn" || echo "  no matching logs"
            echo ""
            echo "=== $POD agent container: ALL last 50 lines ==="
            kubectl logs "$POD" -n hanzo -c agent --tail=50 2>/dev/null || echo "  failed to get logs"
            echo ""
          done

      - name: Gateway ALL VNC logs (last 300 lines)
        run: |
          GWPOD=$(kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$GWPOD" ]; then
            echo "=== Gateway VNC/tunnel logs ==="
            kubectl logs "$GWPOD" -n hanzo --tail=300 2>/dev/null | grep -i "vnc\|tunnel\|invoke" || echo "  no vnc-related gateway logs"
            echo ""
            echo "=== Gateway ALL last 50 lines ==="
            kubectl logs "$GWPOD" -n hanzo --tail=50 2>/dev/null || echo "  failed"
          else
            echo "No gateway pod found"
          fi

      - name: Check x11vnc and VNC handshake test
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi
            echo "=== $POD operative: x11vnc status ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'pgrep -xa x11vnc 2>/dev/null || echo "x11vnc not running"' 2>/dev/null || echo "exec failed"
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ss -tlnp 2>/dev/null | grep 5900 || echo "port 5900 not listening"' 2>/dev/null || true
            echo ""
            echo "=== $POD operative: x11vnc stderr log ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'cat /tmp/x11vnc_stderr.log 2>/dev/null | tail -30 || echo "no stderr log"' 2>/dev/null || true
            echo ""
            echo "=== $POD operative: x11vnc startup script content ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'cat /home/operative/.operative/x11vnc_startup.sh 2>/dev/null || echo "script not found"' 2>/dev/null || true
            echo ""
            echo "=== $POD operative: VNC handshake test (timeout 3s) ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'timeout 3 bash -c "exec 3<>/dev/tcp/127.0.0.1/5900 && cat <&3 & sleep 2 && kill %1 2>/dev/null" 2>/dev/null || echo "handshake test failed/empty"' 2>/dev/null || echo "exec failed"
            echo ""
          done

      - name: Check BOT_NODE_GATEWAY_URL and BOT_VNC env vars
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            echo "=== $POD: env vars (agent container) ==="
            kubectl exec "$POD" -n hanzo -c agent -- sh -c 'echo "BOT_NODE_GATEWAY_URL=$BOT_NODE_GATEWAY_URL"; echo "BOT_VNC_HOST=$BOT_VNC_HOST"; echo "BOT_VNC_PORT=$BOT_VNC_PORT"; echo "BOT_CLOUD_NODE=$BOT_CLOUD_NODE"; echo "AGENT_NODE_ID=$AGENT_NODE_ID"' 2>/dev/null || echo "exec failed"
            echo ""
          done

      - name: Test TCP connectivity from agent to operative VNC port
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            echo "=== $POD: agent→operative TCP 5900 test ==="
            kubectl exec "$POD" -n hanzo -c agent -- sh -c 'timeout 3 bash -c "echo test | nc -w2 127.0.0.1 5900" 2>&1 || echo "nc test failed"' 2>/dev/null || echo "exec failed"
            echo ""
          done
