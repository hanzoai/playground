name: K8s Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: NetworkPolicy YAML details
        run: |
          echo "=== allow-kube-api-egress ==="
          kubectl get networkpolicy allow-kube-api-egress -n hanzo -o yaml
          echo ""
          echo "=== allow-external-egress ==="
          kubectl get networkpolicy allow-external-egress -n hanzo -o yaml
          echo ""
          echo "=== allow-dns-egress ==="
          kubectl get networkpolicy allow-dns-egress -n hanzo -o yaml
          echo ""
          echo "=== allow-intra-namespace-egress ==="
          kubectl get networkpolicy allow-intra-namespace-egress -n hanzo -o yaml 2>/dev/null || echo "Not found"
          echo ""
          echo "=== allow-intra-namespace ==="
          kubectl get networkpolicy allow-intra-namespace -n hanzo -o yaml 2>/dev/null || echo "Not found"

      - name: K8s API endpoint details
        run: |
          echo "=== K8s API service ClusterIP ==="
          kubectl get svc kubernetes -n default -o wide
          echo ""
          echo "=== K8s API endpoints (actual backend IPs) ==="
          kubectl get endpoints kubernetes -n default -o yaml
          echo ""
          echo "=== Cluster info ==="
          kubectl cluster-info

      - name: Playground pod details
        run: |
          POD=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          echo "Pod: $POD"
          echo ""
          echo "=== Pod labels ==="
          kubectl get pod "$POD" -n hanzo -o jsonpath='{.metadata.labels}' | python3 -m json.tool
          echo ""
          echo "=== Service account ==="
          kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.serviceAccountName}'
          echo ""
          echo ""
          echo "=== Service account YAML ==="
          kubectl get serviceaccount playground-agent -n hanzo -o yaml
          echo ""
          echo "=== ClusterRoleBindings for playground-agent ==="
          kubectl get clusterrolebinding -o json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data['items']:
              for sub in item.get('subjects', []):
                  if sub.get('name') == 'playground-agent':
                      print(json.dumps(item, indent=2))
          " 2>/dev/null || echo "None found"
          echo ""
          echo "=== RoleBindings for playground-agent ==="
          kubectl get rolebinding -n hanzo -o json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data['items']:
              for sub in item.get('subjects', []):
                  if sub.get('name') == 'playground-agent':
                      print(json.dumps(item, indent=2))
          " 2>/dev/null || echo "None found"

      - name: Debug pod connectivity test
        run: |
          NODE=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].spec.nodeName}')
          echo "Playground runs on node: $NODE"

          # Clean up any leftover debug pod
          kubectl delete pod playground-debug -n hanzo --ignore-not-found 2>/dev/null || true
          sleep 2

          # Create debug pod with same SA and labels, on same node
          kubectl run playground-debug \
            --namespace=hanzo \
            --image=curlimages/curl:latest \
            --restart=Never \
            --overrides="{
              \"apiVersion\": \"v1\",
              \"spec\": {
                \"serviceAccountName\": \"playground-agent\",
                \"nodeName\": \"$NODE\",
                \"containers\": [{
                  \"name\": \"playground-debug\",
                  \"image\": \"curlimages/curl:latest\",
                  \"command\": [\"sleep\", \"180\"]
                }]
              },
              \"metadata\": {
                \"labels\": {
                  \"app\": \"hanzo-playground\"
                }
              }
            }" \
            --command -- sleep 180

          echo "Waiting for debug pod to be ready..."
          kubectl wait --for=condition=ready pod/playground-debug -n hanzo --timeout=90s || {
            echo "Pod not ready:"
            kubectl describe pod playground-debug -n hanzo
            exit 1
          }

          echo ""
          echo "=== KUBERNETES_SERVICE env vars ==="
          kubectl exec playground-debug -n hanzo -- env | grep KUBERNETES || echo "No vars"

          echo ""
          echo "=== SA token files ==="
          kubectl exec playground-debug -n hanzo -- ls -la /var/run/secrets/kubernetes.io/serviceaccount/ || echo "No SA mount"

          echo ""
          echo "=== Test 1: curl K8s API /healthz (no auth, 10s timeout) ==="
          kubectl exec playground-debug -n hanzo -- sh -c '
            curl -svk --max-time 10 "https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT/healthz" 2>&1
          ' || echo "FAILED"

          echo ""
          echo "=== Test 2: curl K8s API /healthz with SA token ==="
          kubectl exec playground-debug -n hanzo -- sh -c '
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            curl -sv --max-time 10 \
              --cacert "$CACERT" \
              -H "Authorization: Bearer $TOKEN" \
              "https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT/healthz" 2>&1
          ' || echo "FAILED"

          echo ""
          echo "=== Test 3: POST create pod (dry-run) ==="
          kubectl exec playground-debug -n hanzo -- sh -c '
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            curl -sv --max-time 15 \
              --cacert "$CACERT" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -X POST \
              -d "{\"apiVersion\":\"v1\",\"kind\":\"Pod\",\"metadata\":{\"name\":\"test-dry-run\",\"namespace\":\"hanzo\"},\"spec\":{\"containers\":[{\"name\":\"test\",\"image\":\"busybox:latest\",\"command\":[\"sleep\",\"1\"]}],\"restartPolicy\":\"Never\"}}" \
              "https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT/api/v1/namespaces/hanzo/pods?dryRun=All" 2>&1
          ' || echo "FAILED"

          echo ""
          echo "=== Test 4: DNS resolution ==="
          kubectl exec playground-debug -n hanzo -- sh -c '
            nslookup kubernetes.default.svc.cluster.local 2>&1 || echo "nslookup failed"
          ' || echo "FAILED"

          echo ""
          echo "=== Test 5: traceroute to K8s API ==="
          kubectl exec playground-debug -n hanzo -- sh -c '
            curl -sv --max-time 5 --connect-timeout 5 "https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT/" 2>&1 | head -20
          ' || echo "FAILED"

      - name: Cleanup
        if: always()
        run: kubectl delete pod playground-debug -n hanzo --ignore-not-found 2>/dev/null || true

      - name: Playground logs (last 50 lines)
        if: always()
        run: |
          POD=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          echo "=== Playground logs ==="
          kubectl logs "$POD" -n hanzo --tail=50 2>/dev/null || echo "Could not get logs"

      - name: Recent events
        if: always()
        run: |
          echo "=== Recent events in hanzo namespace ==="
          kubectl get events -n hanzo --sort-by='.lastTimestamp' | tail -20
