name: K8s Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: NetworkPolicy YAML - kube-api-egress
        run: |
          echo "=== allow-kube-api-egress ==="
          kubectl get networkpolicy allow-kube-api-egress -n hanzo -o yaml
          echo ""
          echo "=== allow-external-egress ==="
          kubectl get networkpolicy allow-external-egress -n hanzo -o yaml
          echo ""
          echo "=== allow-dns-egress ==="
          kubectl get networkpolicy allow-dns-egress -n hanzo -o yaml
          echo ""
          echo "=== default-deny-ingress ==="
          kubectl get networkpolicy default-deny-ingress -n hanzo -o yaml
          echo ""
          echo "=== allow-intra-namespace ==="
          kubectl get networkpolicy allow-intra-namespace -n hanzo -o yaml
          echo ""
          echo "=== allow-from-ingress-and-nodes ==="
          kubectl get networkpolicy allow-from-ingress-and-nodes -n hanzo -o yaml

      - name: Playground pod details
        run: |
          POD=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          echo "Pod: $POD"
          echo ""
          echo "=== Full pod YAML (spec only) ==="
          kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec}' | python3 -m json.tool 2>/dev/null || kubectl get pod "$POD" -n hanzo -o yaml | grep -A 50 "spec:"
          echo ""
          echo "=== Pod labels ==="
          kubectl get pod "$POD" -n hanzo -o jsonpath='{.metadata.labels}' | python3 -m json.tool
          echo ""
          echo "=== Service account details ==="
          kubectl get serviceaccount playground-agent -n hanzo -o yaml
          echo ""
          echo "=== ClusterRole/ClusterRoleBinding for playground-agent ==="
          kubectl get clusterrolebinding -o json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data['items']:
              for sub in item.get('subjects', []):
                  if sub.get('name') == 'playground-agent':
                      print(json.dumps(item, indent=2))
          " 2>/dev/null || echo "No ClusterRoleBinding found"
          echo ""
          echo "=== RoleBinding for playground-agent ==="
          kubectl get rolebinding -n hanzo -o json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data['items']:
              for sub in item.get('subjects', []):
                  if sub.get('name') == 'playground-agent':
                      print(json.dumps(item, indent=2))
          " 2>/dev/null || echo "No RoleBinding found"

      - name: Debug pod - test K8s API connectivity
        run: |
          echo "=== Launching debug pod on same node as playground ==="
          NODE=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].spec.nodeName}')
          echo "Playground node: $NODE"

          # Create a debug pod with the same service account
          cat <<'DEBUGEOF' | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: playground-debug
            namespace: hanzo
            labels:
              app: hanzo-playground
          spec:
            serviceAccountName: playground-agent
            nodeName: NODEPLACEHOLDER
            containers:
            - name: debug
              image: curlimages/curl:latest
              command: ["sleep", "120"]
            restartPolicy: Never
          DEBUGEOF

          # Patch the node name
          kubectl delete pod playground-debug -n hanzo --ignore-not-found 2>/dev/null || true
          sleep 2

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: playground-debug
            namespace: hanzo
            labels:
              app: hanzo-playground
          spec:
            serviceAccountName: playground-agent
            nodeName: "$NODE"
            containers:
            - name: debug
              image: curlimages/curl:latest
              command: ["sleep", "120"]
            restartPolicy: Never
          EOF

          echo "Waiting for debug pod..."
          kubectl wait --for=condition=ready pod/playground-debug -n hanzo --timeout=60s || {
            echo "Debug pod not ready, checking status:"
            kubectl describe pod playground-debug -n hanzo
            exit 0
          }

          echo ""
          echo "=== Environment vars ==="
          kubectl exec playground-debug -n hanzo -- env | grep KUBERNETES || echo "No KUBERNETES vars"

          echo ""
          echo "=== SA token exists? ==="
          kubectl exec playground-debug -n hanzo -- ls -la /var/run/secrets/kubernetes.io/serviceaccount/ 2>/dev/null || echo "No SA mount"

          echo ""
          echo "=== Test K8s API /healthz ==="
          kubectl exec playground-debug -n hanzo -- curl -sk --max-time 10 https://${KUBERNETES_SERVICE_HOST:-10.124.32.1}:${KUBERNETES_SERVICE_PORT:-443}/healthz 2>&1 || true

          echo ""
          echo "=== Test K8s API with SA token ==="
          kubectl exec playground-debug -n hanzo -- sh -c '
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            HOST=$KUBERNETES_SERVICE_HOST
            PORT=$KUBERNETES_SERVICE_PORT
            echo "Connecting to https://$HOST:$PORT/healthz"
            curl -sk --max-time 10 \
              --cacert "$CACERT" \
              -H "Authorization: Bearer $TOKEN" \
              "https://$HOST:$PORT/healthz" 2>&1
            echo ""
            echo "Exit code: $?"
          ' || echo "Could not test with SA token"

          echo ""
          echo "=== Test creating a pod via API ==="
          kubectl exec playground-debug -n hanzo -- sh -c '
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            HOST=$KUBERNETES_SERVICE_HOST
            PORT=$KUBERNETES_SERVICE_PORT
            echo "Testing POST to pods API..."
            curl -sk --max-time 10 \
              --cacert "$CACERT" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -X POST \
              -d "{\"apiVersion\":\"v1\",\"kind\":\"Pod\",\"metadata\":{\"name\":\"test-probe-$(date +%s)\",\"namespace\":\"hanzo\"},\"spec\":{\"containers\":[{\"name\":\"test\",\"image\":\"busybox\",\"command\":[\"sleep\",\"1\"]}],\"restartPolicy\":\"Never\"}}" \
              "https://$HOST:$PORT/api/v1/namespaces/hanzo/pods" 2>&1
            echo ""
            echo "Exit code: $?"
          ' || echo "Could not test pod creation"

          echo ""
          echo "=== TCP connectivity test ==="
          kubectl exec playground-debug -n hanzo -- sh -c '
            HOST=$KUBERNETES_SERVICE_HOST
            PORT=$KUBERNETES_SERVICE_PORT
            echo "Testing TCP to $HOST:$PORT..."
            curl -sk --max-time 5 --connect-timeout 5 "https://$HOST:$PORT/" 2>&1
            echo "Exit: $?"
          ' || echo "TCP test failed"

      - name: Cleanup debug pod
        if: always()
        run: |
          kubectl delete pod playground-debug -n hanzo --ignore-not-found 2>/dev/null || true
          # Also clean up any test-probe pods
          kubectl delete pods -n hanzo -l "!app" --field-selector=status.phase=Succeeded --ignore-not-found 2>/dev/null || true

      - name: Playground logs
        run: |
          POD=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          echo "=== Last 100 lines of playground logs ==="
          kubectl logs "$POD" -n hanzo --tail=100 2>/dev/null || echo "Could not get logs"
