name: Check VNC Tunnel Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  check-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check agent pod status and image
        run: |
          echo "=== Agent pods ==="
          kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o wide 2>/dev/null || echo "No agent pods"
          echo ""
          echo "=== Bot gateway pods ==="
          kubectl get pods -n hanzo -l app=bot-gateway -o wide 2>/dev/null || true

      - name: Check agent pod image version
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            echo "=== $POD container images ==="
            kubectl get pod "$POD" -n hanzo -o jsonpath='{range .spec.containers[*]}{.name}: {.image}{"\n"}{end}' 2>/dev/null
            echo ""
          done

      - name: Check node-host VNC tunnel logs
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            echo "=== $POD main container logs (vnc related) ==="
            kubectl logs "$POD" -n hanzo -c bot --tail=100 2>/dev/null | grep -i "vnc\|tunnel\|BOT_NODE_GATEWAY" || echo "  no vnc-related logs"
            echo ""
          done

      - name: Check gateway VNC logs
        run: |
          echo "=== Bot gateway logs (vnc related) ==="
          GWPOD=$(kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$GWPOD" ]; then
            kubectl logs "$GWPOD" -n hanzo --tail=200 2>/dev/null | grep -i "vnc\|tunnel" || echo "  no vnc-related gateway logs"
          else
            echo "No gateway pod found"
          fi

      - name: Check x11vnc in operative containers
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            HAS_OPERATIVE=$(kubectl get pod "$POD" -n hanzo -o jsonpath='{.spec.containers[?(@.name=="operative")].name}' 2>/dev/null)
            if [ -z "$HAS_OPERATIVE" ]; then continue; fi
            echo "=== $POD operative: x11vnc status ==="
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'pgrep -xa x11vnc 2>/dev/null || echo "x11vnc not running"' 2>/dev/null || echo "exec failed"
            kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ss -tlnp 2>/dev/null | grep 5900 || echo "port 5900 not listening"' 2>/dev/null || true
            echo ""
          done

      - name: Check BOT_NODE_GATEWAY_URL env var in agent pods
        run: |
          PODS=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
          for POD in $PODS; do
            echo "=== $POD: BOT_NODE_GATEWAY_URL ==="
            kubectl exec "$POD" -n hanzo -c bot -- sh -c 'echo $BOT_NODE_GATEWAY_URL' 2>/dev/null || echo "exec failed"
          done
