name: Fix K8s API NetworkPolicy

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  fix-netpol:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Get K8s API external URL
        id: api
        run: |
          # Get the external API server URL from cluster-info
          EXTERNAL_URL=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
          echo "external_url=$EXTERNAL_URL" >> "$GITHUB_OUTPUT"
          echo "K8s API external URL: $EXTERNAL_URL"

          # Get the actual endpoint IP for reference
          ENDPOINT_IP=$(kubectl get endpoints kubernetes -n default -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || echo "unknown")
          echo "K8s API endpoint IP: $ENDPOINT_IP"

          # Get current ClusterIP
          CLUSTER_IP=$(kubectl get svc kubernetes -n default -o jsonpath='{.spec.clusterIP}')
          echo "K8s API ClusterIP: $CLUSTER_IP"

      - name: Set KUBERNETES_API_URL on playground deployment
        run: |
          EXTERNAL_URL="${{ steps.api.outputs.external_url }}"
          echo "Setting KUBERNETES_API_URL=$EXTERNAL_URL on hanzo-playground deployment"

          # Set env var on the playground container
          kubectl set env deployment/hanzo-playground -n hanzo \
            "KUBERNETES_API_URL=$EXTERNAL_URL"

          echo "Env var set. Waiting for rollout..."
          kubectl rollout status deployment/hanzo-playground -n hanzo --timeout=180s
          echo "Rollout complete."

      - name: Verify K8s API connectivity from new playground pod
        run: |
          # Wait a moment for the new pod to fully start
          sleep 10

          POD=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].metadata.name}' --sort-by='.metadata.creationTimestamp' 2>/dev/null)
          echo "New playground pod: $POD"
          echo ""

          echo "=== Pod env vars (KUBERNETES) ==="
          kubectl get pod "$POD" -n hanzo -o json | python3 -c "
          import sys, json
          pod = json.load(sys.stdin)
          for c in pod['spec']['containers']:
              for e in c.get('env', []):
                  if 'KUBERNETES' in e.get('name', ''):
                      print(f\"{e['name']}={e.get('value', '<from-ref>')}\")
          "

          echo ""
          echo "=== Recent playground logs ==="
          kubectl logs "$POD" -n hanzo --tail=30 2>/dev/null || echo "Could not get logs"

      - name: Test provision from debug pod
        run: |
          kubectl delete pod api-test -n hanzo --ignore-not-found 2>/dev/null || true
          sleep 2

          # Create a test pod to curl the playground provision endpoint
          kubectl run api-test \
            --namespace=hanzo \
            --image=curlimages/curl:latest \
            --restart=Never \
            --command -- sleep 60

          kubectl wait --for=condition=ready pod/api-test -n hanzo --timeout=60s

          echo "=== Test: curl playground health ==="
          kubectl exec api-test -n hanzo -- curl -s --max-time 10 \
            "http://hanzo-playground.hanzo.svc:8080/api/v1/health" 2>&1 || echo "Health check failed"

          echo ""
          echo "=== Test: curl playground cloud sync ==="
          kubectl exec api-test -n hanzo -- curl -s --max-time 30 \
            -X POST \
            "http://hanzo-playground.hanzo.svc:8080/api/cloud/sync" 2>&1 || echo "Sync failed"

      - name: Cleanup
        if: always()
        run: kubectl delete pod api-test -n hanzo --ignore-not-found 2>/dev/null || true
