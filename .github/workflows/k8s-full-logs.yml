name: Check Full Logs
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Gateway full logs (last 100)
        run: |
          GWPOD=$(kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{.items[0].metadata.name}')
          echo "=== Gateway pod: $GWPOD ==="
          kubectl logs "$GWPOD" -n hanzo --tail=100 2>/dev/null || echo "failed"
      - name: Bot container full logs (last 100)
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "=== Bot container logs: $POD ==="
          kubectl logs "$POD" -n hanzo -c bot --tail=100 2>/dev/null || echo "failed"
      - name: Check bot container env vars
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "=== Bot container env (filtered) ==="
          kubectl exec "$POD" -n hanzo -c bot -- env 2>/dev/null | grep -i "BOT_\|GATEWAY\|NODE" || echo "exec failed or no matches"
      - name: Check bot container image digest
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "=== Image status ==="
          kubectl get pod "$POD" -n hanzo -o jsonpath='{range .status.containerStatuses[*]}{.name}: {.image} -> {.imageID}{"\n"}{end}'
      - name: Check gateway node registry
        run: |
          GWPOD=$(kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{.items[0].metadata.name}')
          echo "=== Gateway logs: node connections ==="
          kubectl logs "$GWPOD" -n hanzo --tail=500 2>/dev/null | grep -i "node\|register\|connect\|hello" || echo "no node-related logs"
