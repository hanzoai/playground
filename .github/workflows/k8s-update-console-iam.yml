name: Update Console IAM Config

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  update-console-iam:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check console pod status and logs
        run: |
          echo "=== Console pods ==="
          kubectl get pods -n hanzo -l app=console -o wide 2>/dev/null || kubectl get pods -n hanzo | grep console
          echo ""

          echo "=== Console deployment env vars ==="
          kubectl get deploy console -n hanzo -o jsonpath='{range .spec.template.spec.containers[*].env[*]}{.name}={.value}{"\n"}{end}' | grep -iE 'IAM|AUTH|NEXTAUTH|CLIENT'
          echo ""

          echo "=== Console pod logs (last 100 lines) ==="
          POD=$(kubectl get pods -n hanzo -l app=console --field-selector status.phase=Running -o name 2>/dev/null | head -1)
          if [ -z "$POD" ]; then
            POD=$(kubectl get pods -n hanzo | grep console | grep Running | head -1 | awk '{print "pod/"$1}')
          fi
          if [ -n "$POD" ]; then
            echo "Reading logs from: $POD"
            kubectl logs "$POD" -n hanzo --tail=100 2>&1 || true
          else
            echo "No running console pod found"
            kubectl get pods -n hanzo | grep console
          fi

          echo ""
          echo "=== Console worker pod logs ==="
          WPOD=$(kubectl get pods -n hanzo | grep console-worker | grep Running | head -1 | awk '{print "pod/"$1}')
          if [ -n "$WPOD" ]; then
            kubectl logs "$WPOD" -n hanzo --tail=50 2>&1 || true
          fi

      - name: Check envFrom and secrets
        run: |
          echo "=== Console deployment envFrom ==="
          kubectl get deploy console -n hanzo -o jsonpath='{.spec.template.spec.containers[*].envFrom}' 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "No envFrom"
          echo ""

          echo "=== Check if IAM vars come from a secret/configmap ==="
          # Check for secretRef or configMapRef
          kubectl get deploy console -n hanzo -o json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          containers = d['spec']['template']['spec']['containers']
          for c in containers:
            print(f'Container: {c[\"name\"]}')
            for ef in c.get('envFrom', []):
              print(f'  envFrom: {json.dumps(ef)}')
            for e in c.get('env', []):
              if 'IAM' in e.get('name','') or 'CLIENT' in e.get('name','') or 'AUTH' in e.get('name','') or 'NEXTAUTH' in e.get('name',''):
                val = e.get('value', '')
                vf = e.get('valueFrom', '')
                if vf:
                  print(f'  {e[\"name\"]} = (from: {json.dumps(vf)})')
                else:
                  print(f'  {e[\"name\"]} = {val}')
          " 2>&1
