name: Update Console IAM Config

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  update-console-iam:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Test OIDC discovery from console pod
        run: |
          POD=$(kubectl get pods -n hanzo -l app=console --field-selector status.phase=Running -o name | head -1)
          echo "Testing from: $POD"

          echo "=== Test DNS resolution ==="
          kubectl exec -n hanzo "$POD" -- nslookup hanzo.id 2>&1 || \
          kubectl exec -n hanzo "$POD" -- getent hosts hanzo.id 2>&1 || \
          echo "DNS tools not available"

          echo ""
          echo "=== Test OIDC well-known from console pod ==="
          kubectl exec -n hanzo "$POD" -- wget -q -O - --timeout=5 "https://hanzo.id/.well-known/openid-configuration" 2>&1 || \
          kubectl exec -n hanzo "$POD" -- curl -sf --max-time 5 "https://hanzo.id/.well-known/openid-configuration" 2>&1 || \
          echo "FAILED: Console pod cannot reach hanzo.id OIDC endpoint"

          echo ""
          echo "=== Test IAM direct internal ==="
          kubectl exec -n hanzo "$POD" -- wget -q -O - --timeout=5 "http://iam.hanzo.svc:8000/.well-known/openid-configuration" 2>&1 || \
          echo "Internal IAM not reachable either"

          echo ""
          echo "=== Console env ==="
          kubectl exec -n hanzo "$POD" -- env 2>&1 | grep -iE 'IAM|NEXTAUTH|NODE_TLS' || true

          echo ""
          echo "=== Check if NODE_TLS_REJECT_UNAUTHORIZED is needed ==="
          kubectl exec -n hanzo "$POD" -- wget -q -O - --timeout=5 "https://iam.hanzo.ai/.well-known/openid-configuration" 2>&1 || echo "iam.hanzo.ai also unreachable"
