name: Update Console IAM Config

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  update-console-iam:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Generate and set NEXTAUTH_SECRET
        run: |
          # Generate a secure random NEXTAUTH_SECRET
          NEXTAUTH_SECRET=$(openssl rand -base64 32)
          echo "::add-mask::${NEXTAUTH_SECRET}"

          echo "=== Setting NEXTAUTH_SECRET and SALT on console deployment ==="
          kubectl set env deploy/console -n hanzo \
            NEXTAUTH_SECRET="${NEXTAUTH_SECRET}" \
            SALT="${NEXTAUTH_SECRET}"

          echo "=== Setting NEXTAUTH_SECRET and SALT on console-worker deployment ==="
          kubectl set env deploy/console-worker -n hanzo \
            NEXTAUTH_SECRET="${NEXTAUTH_SECRET}" \
            SALT="${NEXTAUTH_SECRET}" 2>/dev/null || echo "console-worker not found or no change needed"

          echo "=== Waiting for console rollout ==="
          kubectl rollout status deploy/console -n hanzo --timeout=180s

          echo "=== Verify NEXTAUTH env vars ==="
          kubectl get deploy console -n hanzo -o jsonpath='{range .spec.template.spec.containers[*].env[*]}{.name}={.value}{"\n"}{end}' | grep -iE 'NEXTAUTH|SALT|IAM_CLIENT'
