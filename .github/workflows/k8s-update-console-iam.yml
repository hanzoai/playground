name: Update Console IAM Config

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  update-console-iam:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check hanzo-cloud app in IAM DB
        run: |
          echo "=== hanzo-cloud application config ==="
          kubectl exec -n hanzo deploy/iam -- psql "postgresql://iam:iam@iam-db:5432/iam?sslmode=disable" -c \
            "SELECT name, client_id, client_secret, redirect_uris, token_format, enable_code_signin, grant_types FROM application WHERE name = 'hanzo-cloud' OR client_id = 'hanzo-cloud';" 2>&1 || true

          echo ""
          echo "=== Check if app-console exists ==="
          kubectl exec -n hanzo deploy/iam -- psql "postgresql://iam:iam@iam-db:5432/iam?sslmode=disable" -c \
            "SELECT name, client_id, redirect_uris FROM application WHERE name LIKE '%console%' OR client_id LIKE '%console%';" 2>&1 || true

          echo ""
          echo "=== Check grant_types and response_types for hanzo-cloud ==="
          kubectl exec -n hanzo deploy/iam -- psql "postgresql://iam:iam@iam-db:5432/iam?sslmode=disable" -c \
            "SELECT name, grant_types, response_types, enable_password, enable_sign_up, enable_code_signin FROM application WHERE client_id = 'hanzo-cloud';" 2>&1 || true

      - name: Test OIDC well-known
        run: |
          echo "=== OIDC discovery ==="
          curl -s https://hanzo.id/.well-known/openid-configuration | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for k in ['issuer','authorization_endpoint','token_endpoint','code_challenge_methods_supported','grant_types_supported','response_types_supported']:
            print(f'{k}: {d.get(k, \"NOT FOUND\")}')
          "

      - name: Check console NEXTAUTH_SECRET
        run: |
          echo "=== NEXTAUTH env vars ==="
          kubectl get deploy console -n hanzo -o jsonpath='{range .spec.template.spec.containers[*].env[*]}{.name}={.value}{"\n"}{end}' | grep -iE 'NEXTAUTH|SECRET|SALT' || echo "No NEXTAUTH vars found in env"

          echo ""
          echo "=== Check envFrom secrets ==="
          kubectl get deploy console -n hanzo -o json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for c in d['spec']['template']['spec']['containers']:
            for ef in c.get('envFrom', []):
              if 'secretRef' in ef:
                name = ef['secretRef']['name']
                print(f'Secret: {name}')
                import subprocess
                r = subprocess.run(['kubectl','get','secret',name,'-n','hanzo','-o','jsonpath={.data}'], capture_output=True, text=True)
                import base64
                data = json.loads(r.stdout) if r.stdout else {}
                for k,v in sorted(data.items()):
                  if any(x in k.upper() for x in ['NEXTAUTH','SECRET','SALT','IAM','CLIENT','AUTH']):
                    print(f'  {k}={base64.b64decode(v).decode()[:50]}...')
          " 2>&1 || true
