name: Update Console IAM Config

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  update-console-iam:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Show current console IAM env vars
        run: |
          echo "=== Current console deployment IAM env vars ==="
          kubectl get deploy -n hanzo -o name | grep -i console || kubectl get deploy -n hanzo -o name | grep -i cloud
          echo ""
          echo "=== All deployments in hanzo namespace ==="
          kubectl get deploy -n hanzo -o name
          echo ""
          echo "=== Looking for IAM env vars ==="
          for deploy in $(kubectl get deploy -n hanzo -o name); do
            IAM_VARS=$(kubectl get "$deploy" -n hanzo -o jsonpath='{range .spec.template.spec.containers[*].env[*]}{.name}={.value}{"\n"}{end}' 2>/dev/null | grep -i IAM || true)
            if [ -n "$IAM_VARS" ]; then
              echo "--- $deploy ---"
              echo "$IAM_VARS"
              echo ""
            fi
          done

      - name: Update console IAM config
        run: |
          # Find the console/cloud deployment
          DEPLOY=$(kubectl get deploy -n hanzo -o name | grep -E '(console|cloud-web)' | head -1)
          if [ -z "$DEPLOY" ]; then
            echo "ERROR: Could not find console/cloud deployment"
            kubectl get deploy -n hanzo
            exit 1
          fi
          echo "Found deployment: $DEPLOY"

          # Update IAM_CLIENT_ID and IAM_CLIENT_SECRET
          kubectl set env "$DEPLOY" -n hanzo \
            IAM_CLIENT_ID=hanzo-cloud \
            IAM_CLIENT_SECRET=62484ae37fb49bc602f204c035b001c5fe8a2034dc7d54f0

          echo "Updated IAM env vars. Waiting for rollout..."
          kubectl rollout status "$DEPLOY" -n hanzo --timeout=120s

          echo "=== Verify new env vars ==="
          kubectl get "$DEPLOY" -n hanzo -o jsonpath='{range .spec.template.spec.containers[*].env[*]}{.name}={.value}{"\n"}{end}' | grep -i IAM
