name: Update Console IAM Config

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  update-console-iam:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Enable NextAuth debug and tail logs
        run: |
          echo "=== Enable NEXTAUTH_DEBUG ==="
          kubectl set env deploy/console -n hanzo NEXTAUTH_DEBUG=true
          kubectl rollout status deploy/console -n hanzo --timeout=180s

          echo ""
          echo "=== Now tailing console logs for 60s - USER SHOULD TRY SIGNING IN ==="
          timeout 60 kubectl logs -f deploy/console -n hanzo --since=10s 2>&1 | grep -iE 'error|oauth|callback|iam|auth|token|sign|debug|warn' || true

          echo ""
          echo "=== Full recent logs ==="
          kubectl logs deploy/console -n hanzo --tail=50 2>&1
