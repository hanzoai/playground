name: Restart x11vnc and Test

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check current state and startup script
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "Pod: $POD"
          echo "=== x11vnc process ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep -E "x11vnc|Xvfb|Xvnc|websockify" | grep -v grep' 2>&1
          echo "=== x11vnc startup script ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'cat /x11vnc_startup.sh 2>/dev/null || cat ./x11vnc_startup.sh 2>/dev/null || find / -name "x11vnc_startup.sh" -exec cat {} \; 2>/dev/null || echo "not found"' 2>&1
          echo "=== Xvfb/display check ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ls -la /tmp/.X*-unix/ 2>/dev/null; echo "---"; ls -la /tmp/.X11-unix/ 2>/dev/null; echo "---"; cat /tmp/.X1-lock 2>/dev/null; echo "---"; cat /tmp/.X0-lock 2>/dev/null' 2>&1

      - name: Kill x11vnc only, restart on display :1, test
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')

          cat > /tmp/restart_test.py << 'PYEOF'
          import subprocess, socket, time, sys, os, signal

          print("=== Step 1: Kill only x11vnc process (not startup script) ===")
          # Find x11vnc PID (not the startup script)
          r = subprocess.run(["pgrep", "-f", "x11vnc -display"], capture_output=True, text=True)
          pids = r.stdout.strip().split()
          print(f"x11vnc PIDs: {pids}")
          for pid in pids:
              try:
                  os.kill(int(pid), signal.SIGKILL)
                  print(f"Killed PID {pid}")
              except Exception as e:
                  print(f"Failed to kill {pid}: {e}")
          time.sleep(2)

          # Check if Xvfb is still running
          r = subprocess.run(["pgrep", "-a", "Xvfb"], capture_output=True, text=True)
          print(f"Xvfb processes: {r.stdout.strip() or 'NONE'}")
          r = subprocess.run(["pgrep", "-a", "Xvnc"], capture_output=True, text=True)
          print(f"Xvnc processes: {r.stdout.strip() or 'NONE'}")

          # Check display socket
          r = subprocess.run(["ls", "-la", "/tmp/.X11-unix/"], capture_output=True, text=True)
          print(f"X11 sockets: {r.stdout.strip()}")

          print("\n=== Step 2: Restart x11vnc on display :1 ===")
          env = os.environ.copy()
          env["DISPLAY"] = ":1"

          proc = subprocess.Popen(
              ["x11vnc", "-display", ":1", "-forever", "-shared",
               "-nopw", "-nolookup", "-noxdamage", "-nap",
               "-rfbport", "5900", "-o", "/tmp/x11vnc_restart.log"],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
              env=env
          )
          print(f"Started x11vnc PID={proc.pid}")
          time.sleep(3)

          if proc.poll() is not None:
              print(f"FAILED: x11vnc exited with code {proc.returncode}")
              try:
                  with open("/tmp/x11vnc_restart.log") as f:
                      print(f"Log:\n{f.read()[:2000]}")
              except: pass
              sys.exit(1)

          r = subprocess.run(["ps", "-p", str(proc.pid), "-o", "pid,%cpu,%mem,stat,args", "--no-headers"],
                              capture_output=True, text=True)
          print(f"x11vnc status: {r.stdout.strip()}")

          print("\n=== Step 3: Test RFB protocol ===")

          # Test 1: Normal RFB - server should speak first
          print("Test A: Connect and wait for server banner (normal RFB)...")
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.settimeout(5)
          try:
              s.connect(("127.0.0.1", 5900))
              print("Connected to :5900")
              data = s.recv(100)
              print(f"Got {len(data)} bytes: {data!r}")
              if data.startswith(b"RFB"):
                  print("SUCCESS: Server spoke first with RFB version!")
              else:
                  print(f"Got unexpected data: {data[:20].hex()}")
          except socket.timeout:
              print("TIMEOUT: Server did NOT speak first (MSG_PEEK deadlock confirmed)")
          except Exception as e:
              print(f"ERROR: {e}")
          s.close()

          time.sleep(1)

          # Test 2: Send RFB version first
          print("\nTest B: Send RFB version first...")
          s2 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s2.settimeout(5)
          try:
              s2.connect(("127.0.0.1", 5900))
              s2.sendall(b"RFB 003.008\n")
              print("Sent RFB 003.008\\n, waiting...")
              data = s2.recv(200)
              print(f"Got {len(data)} bytes: {data!r}")
              if data.startswith(b"RFB"):
                  print("SUCCESS: RFB injection worked!")
              elif len(data) > 0:
                  print(f"Got something: hex={data[:30].hex()}")
              else:
                  print("Got 0 bytes")
          except socket.timeout:
              print("TIMEOUT: RFB injection did NOT work")
          except Exception as e:
              print(f"ERROR: {e}")
          s2.close()

          time.sleep(1)

          # Check CPU after connection tests
          r = subprocess.run(["ps", "-p", str(proc.pid), "-o", "pid,%cpu,%mem,stat", "--no-headers"],
                              capture_output=True, text=True)
          print(f"\nCPU after tests: {r.stdout.strip()}")

          print("\n=== Step 4: x11vnc log ===")
          try:
              with open("/tmp/x11vnc_restart.log") as f:
                  log = f.read()
                  # Show last 1500 chars
                  print(log[-1500:] if len(log) > 1500 else log)
          except Exception as e:
              print(f"Cannot read log: {e}")
          PYEOF

          kubectl cp /tmp/restart_test.py "$POD":/tmp/restart_test.py -n hanzo -c operative
          kubectl exec "$POD" -n hanzo -c operative -- timeout 30 python3 /tmp/restart_test.py 2>&1
