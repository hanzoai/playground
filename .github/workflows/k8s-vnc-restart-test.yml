name: Restart x11vnc and Test

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check x11vnc state
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "Pod: $POD"
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep -E "x11vnc|Xvfb|websockify" | grep -v grep' 2>&1

      - name: Test RFB protocol on current x11vnc
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')

          cat > /tmp/rfb_test.py << 'PYEOF'
          import socket, time

          print("=== Test A: Normal RFB (wait for server banner) ===")
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.settimeout(5)
          try:
              s.connect(("127.0.0.1", 5900))
              print("Connected to :5900")
              data = s.recv(100)
              print(f"Got {len(data)} bytes: {data!r}")
              if data.startswith(b"RFB"):
                  print("SUCCESS: Server spoke first with RFB version!")
              else:
                  print(f"Got unexpected data: {data[:20].hex()}")
          except socket.timeout:
              print("TIMEOUT: Server did NOT speak first (MSG_PEEK deadlock)")
          except Exception as e:
              print(f"ERROR: {e}")
          s.close()
          time.sleep(1)

          print("\n=== Test B: Send RFB version first ===")
          s2 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s2.settimeout(5)
          try:
              s2.connect(("127.0.0.1", 5900))
              s2.sendall(b"RFB 003.008\n")
              print("Sent RFB 003.008, waiting...")
              data = s2.recv(200)
              print(f"Got {len(data)} bytes: {data!r}")
              if data.startswith(b"RFB"):
                  print("SUCCESS: RFB injection worked!")
              elif len(data) > 0:
                  print(f"Got data: hex={data[:30].hex()}")
          except socket.timeout:
              print("TIMEOUT: RFB injection did NOT work")
          except Exception as e:
              print(f"ERROR: {e}")
          s2.close()
          time.sleep(1)

          print("\n=== Test C: WebSocket upgrade to x11vnc:5900 ===")
          s3 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s3.settimeout(5)
          try:
              s3.connect(("127.0.0.1", 5900))
              upgrade = (
                  "GET / HTTP/1.1\r\n"
                  "Host: 127.0.0.1:5900\r\n"
                  "Upgrade: websocket\r\n"
                  "Connection: Upgrade\r\n"
                  "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==\r\n"
                  "Sec-WebSocket-Version: 13\r\n"
                  "\r\n"
              )
              s3.sendall(upgrade.encode())
              print(f"Sent WS upgrade ({len(upgrade)} bytes)")
              data = s3.recv(4096)
              resp = data.decode("utf-8", errors="replace")[:500]
              print(f"Got {len(data)} bytes: {resp}")
              if b"101" in data:
                  print("SUCCESS: WebSocket upgrade accepted!")
              elif b"RFB" in data:
                  print("INFO: x11vnc treated GET as RFB data")
          except socket.timeout:
              print("TIMEOUT: WS upgrade got no response")
          except Exception as e:
              print(f"ERROR: {e}")
          s3.close()
          time.sleep(1)

          print("\n=== Test D: websockify:6080 WS upgrade + wait for RFB ===")
          import base64, os, struct
          s4 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s4.settimeout(10)
          try:
              s4.connect(("127.0.0.1", 6080))
              key = base64.b64encode(os.urandom(16)).decode()
              upgrade = (
                  "GET / HTTP/1.1\r\n"
                  f"Host: 127.0.0.1:6080\r\n"
                  "Upgrade: websocket\r\n"
                  "Connection: Upgrade\r\n"
                  f"Sec-WebSocket-Key: {key}\r\n"
                  "Sec-WebSocket-Version: 13\r\n"
                  "\r\n"
              )
              s4.sendall(upgrade.encode())
              resp = b""
              while True:
                  chunk = s4.recv(4096)
                  if not chunk: break
                  resp += chunk
                  if b"\r\n\r\n" in resp: break
              print(f"websockify HTTP: {resp.decode('utf-8', errors='replace')[:200]}")
              if b"101" not in resp:
                  print("FAILED: No 101")
              else:
                  print("WS upgrade OK, waiting for x11vnc RFB banner via websockify...")
                  s4.settimeout(10)
                  try:
                      frame = s4.recv(4096)
                      print(f"Got WS frame: {len(frame)} bytes, hex={frame[:40].hex()}")
                      if len(frame) >= 2:
                          opcode = frame[0] & 0x0f
                          length = frame[1] & 0x7f
                          ps = 2
                          if length == 126: ps = 4
                          elif length == 127: ps = 10
                          payload = frame[ps:ps+length]
                          print(f"opcode={opcode} len={length} payload={payload!r}")
                          if b"RFB" in payload:
                              print("SUCCESS: x11vnc sent RFB through websockify!")
                          elif opcode == 8:
                              cc = struct.unpack(">H", payload[:2])[0] if len(payload) >= 2 else 0
                              cm = payload[2:].decode("utf-8", errors="replace") if len(payload) > 2 else ""
                              print(f"WS CLOSE: code={cc} msg={cm}")
                  except socket.timeout:
                      print("TIMEOUT: No data from websockify (x11vnc deadlocked)")
          except socket.timeout:
              print("TIMEOUT connecting to websockify")
          except Exception as e:
              print(f"ERROR: {e}")
          s4.close()

          print("\n=== Test E: Check x11vnc CPU after all tests ===")
          import subprocess
          r = subprocess.run(["ps", "aux"], capture_output=True, text=True)
          for line in r.stdout.split("\n"):
              if "x11vnc" in line and "grep" not in line:
                  print(line)
          PYEOF

          kubectl cp /tmp/rfb_test.py "$POD":/tmp/rfb_test.py -n hanzo -c operative
          kubectl exec "$POD" -n hanzo -c operative -- timeout 60 python3 /tmp/rfb_test.py 2>&1
