name: Restart x11vnc and Test

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check x11vnc state before restart
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')
          echo "Pod: $POD"
          echo "=== x11vnc process ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ps aux | grep x11vnc | grep -v grep' 2>&1
          echo "=== strace peek (1s) ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'timeout 1 strace -p $(pgrep -o x11vnc) -e trace=network 2>&1 || echo "strace not available or timed out"' 2>&1
          echo "=== x11vnc /proc/fd ==="
          kubectl exec "$POD" -n hanzo -c operative -- sh -c 'ls -la /proc/$(pgrep -o x11vnc)/fd 2>/dev/null | head -20 || echo "cannot list fds"' 2>&1

      - name: Kill x11vnc, restart clean, test immediately
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')

          cat > /tmp/restart_test.py << 'PYEOF'
          import subprocess, socket, time, sys

          print("=== Step 1: Kill existing x11vnc ===")
          subprocess.run(["killall", "-9", "x11vnc"], capture_output=True)
          time.sleep(1)

          # Verify it's dead
          r = subprocess.run(["pgrep", "x11vnc"], capture_output=True)
          if r.returncode == 0:
              print(f"WARNING: x11vnc still running: {r.stdout.decode().strip()}")
              subprocess.run(["killall", "-9", "x11vnc"], capture_output=True)
              time.sleep(1)
          print("x11vnc killed")

          print("\n=== Step 2: Find DISPLAY and restart x11vnc ===")
          # Check what display is available
          r = subprocess.run(["ls", "/tmp/.X11-unix/"], capture_output=True, text=True)
          print(f"X11 sockets: {r.stdout.strip()}")

          display = ":0"
          for f in r.stdout.strip().split():
              if f.startswith("X"):
                  display = f":{f[1:]}"
                  break
          print(f"Using DISPLAY={display}")

          # Start x11vnc with minimal flags
          import os
          env = os.environ.copy()
          env["DISPLAY"] = display

          proc = subprocess.Popen(
              ["x11vnc", "-display", display, "-forever", "-shared",
               "-nopw", "-nolookup", "-noxdamage", "-nap",
               "-rfbport", "5900", "-o", "/tmp/x11vnc_restart.log"],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
              env=env
          )
          print(f"Started x11vnc PID={proc.pid}")
          time.sleep(2)

          # Check it's running
          if proc.poll() is not None:
              print(f"FAILED: x11vnc exited with code {proc.returncode}")
              try:
                  with open("/tmp/x11vnc_restart.log") as f:
                      print(f"Log:\n{f.read()[:1000]}")
              except: pass
              sys.exit(1)
          print("x11vnc is running")

          # Check CPU
          r = subprocess.run(["ps", "-p", str(proc.pid), "-o", "%cpu,rss,vsz"], capture_output=True, text=True)
          print(f"CPU/Mem: {r.stdout.strip()}")

          print("\n=== Step 3: Test RFB protocol immediately ===")

          # Test 1: Just connect and wait for server banner
          print("Test 3a: Connect and wait for server to speak first (normal RFB)...")
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.settimeout(5)
          try:
              s.connect(("127.0.0.1", 5900))
              print("Connected!")
              data = s.recv(100)
              print(f"Got {len(data)} bytes: {data!r}")
              if data.startswith(b"RFB"):
                  print("SUCCESS: Server sent RFB version (normal protocol works!)")
              else:
                  print(f"Got non-RFB data: {data[:20].hex()}")
          except socket.timeout:
              print("TIMEOUT: Server did NOT speak first (MSG_PEEK deadlock)")
          except Exception as e:
              print(f"ERROR: {e}")
          s.close()

          time.sleep(1)

          # Test 2: Send RFB version first
          print("\nTest 3b: Send RFB version first (deadlock breaker)...")
          s2 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s2.settimeout(5)
          try:
              s2.connect(("127.0.0.1", 5900))
              s2.sendall(b"RFB 003.008\n")
              print("Sent RFB 003.008, waiting for response...")
              data = s2.recv(200)
              print(f"Got {len(data)} bytes: {data!r}")
              if data.startswith(b"RFB"):
                  print("SUCCESS: Server responded with RFB version!")
              else:
                  print(f"Got non-RFB response: {data[:30].hex()}")
          except socket.timeout:
              print("TIMEOUT: RFB injection did NOT work")
          except Exception as e:
              print(f"ERROR: {e}")
          s2.close()

          time.sleep(1)

          # Test 3: Send HTTP GET (WebSocket upgrade)
          print("\nTest 3c: Send HTTP GET (WebSocket) to trigger WS mode...")
          s3 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s3.settimeout(5)
          try:
              s3.connect(("127.0.0.1", 5900))
              upgrade = (
                  "GET / HTTP/1.1\r\n"
                  "Host: 127.0.0.1:5900\r\n"
                  "Upgrade: websocket\r\n"
                  "Connection: Upgrade\r\n"
                  "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==\r\n"
                  "Sec-WebSocket-Version: 13\r\n"
                  "\r\n"
              )
              s3.sendall(upgrade.encode())
              print(f"Sent {len(upgrade)} bytes WebSocket upgrade")
              data = s3.recv(4096)
              print(f"Got {len(data)} bytes response")
              resp_str = data.decode("utf-8", errors="replace")[:500]
              print(f"Response: {resp_str}")
              if b"101" in data:
                  print("SUCCESS: WebSocket upgrade accepted!")
              elif b"RFB" in data:
                  print("INFO: Server responded with RFB (treated GET as RFB data)")
              else:
                  print(f"Other response, first bytes hex: {data[:20].hex()}")
          except socket.timeout:
              print("TIMEOUT: WS upgrade got no response")
          except Exception as e:
              print(f"ERROR: {e}")
          s3.close()

          print("\n=== Step 4: Check x11vnc CPU after tests ===")
          time.sleep(2)
          r = subprocess.run(["ps", "-p", str(proc.pid), "-o", "%cpu,rss,vsz"], capture_output=True, text=True)
          print(f"CPU/Mem after tests: {r.stdout.strip()}")

          print("\n=== Step 5: x11vnc restart log ===")
          try:
              with open("/tmp/x11vnc_restart.log") as f:
                  log = f.read()
                  print(log[-2000:] if len(log) > 2000 else log)
          except Exception as e:
              print(f"Cannot read log: {e}")
          PYEOF

          kubectl cp /tmp/restart_test.py "$POD":/tmp/restart_test.py -n hanzo -c operative
          kubectl exec "$POD" -n hanzo -c operative -- timeout 30 python3 /tmp/restart_test.py 2>&1

      - name: Test websockify after x11vnc restart
        run: |
          POD=$(kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o jsonpath='{.items[0].metadata.name}')

          cat > /tmp/ws_test2.py << 'PYEOF'
          import socket, base64, os, hashlib, struct

          print("=== Test websockify:6080 → x11vnc:5900 after restart ===")
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.settimeout(10)
          s.connect(("127.0.0.1", 6080))

          key = base64.b64encode(os.urandom(16)).decode()
          upgrade = (
              "GET / HTTP/1.1\r\n"
              f"Host: 127.0.0.1:6080\r\n"
              "Upgrade: websocket\r\n"
              "Connection: Upgrade\r\n"
              f"Sec-WebSocket-Key: {key}\r\n"
              "Sec-WebSocket-Version: 13\r\n"
              "\r\n"
          )
          s.sendall(upgrade.encode())

          # Read HTTP response
          resp = b""
          while True:
              chunk = s.recv(4096)
              if not chunk:
                  break
              resp += chunk
              if b"\r\n\r\n" in resp:
                  break

          print(f"HTTP response: {resp.decode('utf-8', errors='replace')[:300]}")
          if b"101" not in resp:
              print("FAILED: No 101 upgrade")
              s.close()
              exit(1)

          print("WS upgrade OK, waiting for x11vnc to send RFB version via websockify...")
          # websockify bridges TCP, so x11vnc should speak first (RFB banner)
          # This will come as a WS frame
          s.settimeout(10)
          try:
              frame = s.recv(4096)
              print(f"Got WS frame: {len(frame)} bytes")
              print(f"Hex: {frame.hex()}")
              # Parse WS frame
              if len(frame) >= 2:
                  opcode = frame[0] & 0x0f
                  length = frame[1] & 0x7f
                  payload_start = 2
                  if length == 126:
                      payload_start = 4
                  elif length == 127:
                      payload_start = 10
                  payload = frame[payload_start:payload_start+length]
                  print(f"WS opcode={opcode}, length={length}")
                  print(f"Payload: {payload!r}")
                  if b"RFB" in payload:
                      print("SUCCESS: x11vnc sent RFB version through websockify!")
                  elif opcode == 8:
                      close_code = struct.unpack(">H", payload[:2])[0] if len(payload) >= 2 else 0
                      close_msg = payload[2:].decode("utf-8", errors="replace") if len(payload) > 2 else ""
                      print(f"WS CLOSE: code={close_code} msg={close_msg}")
          except socket.timeout:
              print("TIMEOUT: No data from websockify (x11vnc deadlocked again?)")
          s.close()
          PYEOF

          kubectl cp /tmp/ws_test2.py "$POD":/tmp/ws_test2.py -n hanzo -c operative
          kubectl exec "$POD" -n hanzo -c operative -- timeout 30 python3 /tmp/ws_test2.py 2>&1
