name: K8s Cloud Pod Debug

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: List all cloud pods
        run: |
          echo "=== All pods in hanzo namespace ==="
          kubectl get pods -n hanzo -o wide
          echo ""
          echo "=== Pods with cloud label ==="
          kubectl get pods -n hanzo -l "playground.hanzo.ai/type" -o wide 2>/dev/null || echo "No cloud pods found"
          echo ""
          echo "=== Pods matching cloud pattern ==="
          kubectl get pods -n hanzo --field-selector=status.phase!=Running -o wide 2>/dev/null || echo "All pods running"

      - name: Check cloud pod details
        run: |
          echo "=== Describing non-Running pods ==="
          for pod in $(kubectl get pods -n hanzo --field-selector=status.phase!=Running -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- Pod: $pod ---"
            kubectl describe pod "$pod" -n hanzo 2>/dev/null | tail -40
            echo ""
          done

          echo "=== Recent pod events (last 5 min) ==="
          kubectl get events -n hanzo --sort-by='.lastTimestamp' --field-selector=reason!=Pulling,reason!=Pulled 2>/dev/null | tail -30

      - name: Check playground logs for provision errors
        run: |
          POD=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          echo "Playground pod: $POD"
          echo ""
          echo "=== Last 200 lines of playground logs (filtered for cloud/provision/error) ==="
          kubectl logs "$POD" -n hanzo --tail=200 2>/dev/null | grep -iE "cloud|provision|error|fail|k8s|kube|pod|creat" || echo "No matching log lines"

      - name: Check K8s API connectivity from playground
        run: |
          POD=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          echo "=== Playground pod env vars (KUBERNETES) ==="
          kubectl get pod "$POD" -n hanzo -o json | python3 -c "
          import sys, json
          pod = json.load(sys.stdin)
          for c in pod['spec']['containers']:
              for e in c.get('env', []):
                  if 'KUBERNETES' in e.get('name', '') or 'KUBE' in e.get('name', ''):
                      print(f\"{e['name']}={e.get('value', '<from-ref>')}\")
          "

      - name: Test provision from debug pod
        run: |
          kubectl delete pod cloud-test -n hanzo --ignore-not-found 2>/dev/null || true
          sleep 2

          kubectl run cloud-test \
            --namespace=hanzo \
            --image=curlimages/curl:latest \
            --restart=Never \
            --command -- sleep 120

          kubectl wait --for=condition=ready pod/cloud-test -n hanzo --timeout=60s

          echo "=== Test: POST provision endpoint ==="
          kubectl exec cloud-test -n hanzo -- curl -sv --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"display_name":"test-debug","model":"hanzo-dev","os":"linux"}' \
            "http://hanzo-playground.hanzo.svc:8080/v1/cloud/nodes/provision" 2>&1 || echo "Provision test failed"

      - name: Cleanup
        if: always()
        run: kubectl delete pod cloud-test -n hanzo --ignore-not-found 2>/dev/null || true
