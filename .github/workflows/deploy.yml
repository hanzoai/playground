name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'deployments/docker/**'
      - 'control-plane/**'
      - '.github/workflows/deploy.yml'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build control plane UI
        working-directory: control-plane/web/client
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build control plane
        working-directory: control-plane
        run: GOFLAGS=-buildvcs=false go build ./...

      - name: Run tests
        working-directory: control-plane
        run: go test ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ github.repository_owner }}/playground:${TAG}" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ github.repository_owner }}/playground:latest" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ github.repository_owner }}/playground:latest" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ github.repository_owner }}/playground:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push control plane image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/docker/Dockerfile.control-plane
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Pre-deploy snapshot
        id: snapshot
        run: |
          SVC="hanzo-playground"
          NS="hanzo"
          CURRENT_IMAGE=$(kubectl get deployment "$SVC" -n "$NS" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
          echo "current_image=$CURRENT_IMAGE" >> "$GITHUB_OUTPUT"
          echo "### Pre-deploy: $SVC" >> "$GITHUB_STEP_SUMMARY"
          echo "- Current image: \`$CURRENT_IMAGE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target image: \`ghcr.io/hanzoai/playground:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Rolling update
        run: |
          SVC="hanzo-playground"
          NS="hanzo"
          IMAGE="ghcr.io/hanzoai/playground:${{ github.sha }}"
          CONTAINER=$(kubectl get deployment "$SVC" -n "$NS" -o jsonpath='{.spec.template.spec.containers[0].name}')
          echo "Updating $SVC container=$CONTAINER to $IMAGE"
          kubectl set image "deployment/$SVC" "$CONTAINER=$IMAGE" -n "$NS"

      - name: Monitor rollout
        id: rollout
        run: |
          SVC="hanzo-playground"
          NS="hanzo"
          if kubectl rollout status "deployment/$SVC" -n "$NS" --timeout=600s; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Verify pods ready
        if: steps.rollout.outputs.status == 'success'
        run: |
          SVC="hanzo-playground"
          NS="hanzo"
          kubectl wait --for=condition=available "deployment/$SVC" -n "$NS" --timeout=120s
          echo "### Post-deploy: $SVC" >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -l "app=$SVC" -n "$NS" --no-headers | while read line; do
            echo "- \`$line\`" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Auto-rollback on failure
        if: failure()
        run: |
          SVC="hanzo-playground"
          NS="hanzo"
          echo "::warning::Rolling back $SVC to previous version"
          kubectl rollout undo "deployment/$SVC" -n "$NS"
          kubectl rollout status "deployment/$SVC" -n "$NS" --timeout=300s
