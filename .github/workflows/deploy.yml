name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'deployments/docker/**'
      - 'control-plane/**'
      - '.github/workflows/deploy.yml'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build control plane UI
        working-directory: control-plane/web/client
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build control plane
        working-directory: control-plane
        run: GOFLAGS=-buildvcs=false go build ./...

      - name: Run tests
        working-directory: control-plane
        run: go test ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ github.repository_owner }}/playground:${TAG}" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ github.repository_owner }}/playground:latest" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ github.repository_owner }}/playground:latest" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ github.repository_owner }}/playground:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push control plane image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/docker/Dockerfile.control-plane
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    uses: hanzoai/universe/.github/workflows/reusable-deploy-service.yml@main
    with:
      service: hanzo-playground
      image: ghcr.io/hanzoai/playground:${{ github.sha }}
      cluster: hanzo-k8s
      namespace: hanzo
      rollback-on-failure: true
    secrets:
      HANZO_API_KEY: ${{ secrets.HANZO_API_KEY }}
