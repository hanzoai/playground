name: Docker
on:
  workflow_dispatch:
  push:
    branches: [main, dev, test]
    tags: ['v*']
    paths:
      - 'deployments/docker/**'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'web/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/deploy.yml'
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
jobs:
  docker:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/playground
      dockerfile: deployments/docker/Dockerfile
      platforms: linux/amd64
      build-args: |
        VITE_IAM_SERVER_URL=https://hanzo.id
        VITE_IAM_CLIENT_ID=hanzo-bot
    secrets: inherit
