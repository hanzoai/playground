name: Debug IAM Validation

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug-iam:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check @hanzo/iam module in gateway
        run: |
          GW_POD=$(kubectl get pods -n hanzo -o name | grep bot-gateway | head -1 | sed 's|pod/||')
          echo "Pod: $GW_POD"

          echo "=== Check if auth-iam.js exists ==="
          kubectl exec "$GW_POD" -n hanzo -- sh -c '
            find /app -name "auth-iam*" -type f 2>/dev/null | head -10
            echo "---"
            ls -la /app/dist/auth-iam* 2>/dev/null || echo "No auth-iam in dist"
            echo "---"
            ls -la /app/node_modules/@hanzo/iam 2>/dev/null || echo "@hanzo/iam not in node_modules"
            echo "---"
            ls -la /app/node_modules/jose 2>/dev/null || echo "jose not in node_modules"
          ' 2>&1

      - name: Try to import @hanzo/iam in gateway
        run: |
          GW_POD=$(kubectl get pods -n hanzo -o name | grep bot-gateway | head -1 | sed 's|pod/||')
          kubectl exec "$GW_POD" -n hanzo -- node -e '
            async function test() {
              try {
                const iam = await import("@hanzo/iam");
                console.log("@hanzo/iam loaded OK, exports:", Object.keys(iam));
              } catch(e) {
                console.log("@hanzo/iam FAILED:", e.message);
              }
              try {
                const jose = await import("jose");
                console.log("jose loaded OK, exports:", Object.keys(jose).slice(0,10));
              } catch(e) {
                console.log("jose FAILED:", e.message);
              }
              // Try the actual auth-iam module path
              try {
                // Find the auth-iam chunk
                const fs = await import("fs");
                const files = fs.readdirSync("/app/dist").filter(f => f.includes("auth-iam"));
                console.log("auth-iam dist files:", files);
              } catch(e) {
                console.log("dist scan failed:", e.message);
              }
            }
            test().catch(e => console.error("test failed:", e));
          ' 2>&1

      - name: Test JWT validation with current JWKS
        run: |
          GW_POD=$(kubectl get pods -n hanzo -o name | grep bot-gateway | head -1 | sed 's|pod/||')

          echo "=== Fetch JWKS and check key details ==="
          kubectl exec "$GW_POD" -n hanzo -- node -e '
            const http = require("http");
            http.get("http://iam.hanzo.svc.cluster.local/.well-known/jwks", (res) => {
              let data = "";
              res.on("data", c => data += c);
              res.on("end", () => {
                try {
                  const jwks = JSON.parse(data);
                  for (const key of (jwks.keys || [])) {
                    const kid = key.kid || "unknown";
                    const alg = key.alg || "unknown";
                    const kty = key.kty || "unknown";
                    const nPrefix = (key.n || "").substring(0, 20);
                    const x5cCount = (key.x5c || []).length;
                    console.log(`kid=${kid} alg=${alg} kty=${kty} n_prefix=${nPrefix}... x5c_count=${x5cCount}`);
                    if (key.x5c && key.x5c[0]) {
                      const certDer = Buffer.from(key.x5c[0], "base64");
                      console.log(`  cert_size=${certDer.length} bytes`);
                    }
                  }
                } catch(e) {
                  console.log("Parse error:", e.message);
                  console.log("Raw response:", data.substring(0, 500));
                }
              });
            }).on("error", e => console.log("Request error:", e.message));
          ' 2>&1

      - name: Enhanced gateway auth logs with full context
        run: |
          GW_POD=$(kubectl get pods -n hanzo -o name | grep bot-gateway | head -1 | sed 's|pod/||')
          echo "=== Full context around auth failures (last 1000 lines) ==="
          kubectl logs "$GW_POD" -n hanzo --tail=1000 2>&1 | grep -B2 -A2 -iE "iam_validation|unauthorized|auth.*fail|import.*error|module.*not.*found|cannot find" | tail -60

      - name: Check gateway startup for module errors
        run: |
          GW_POD=$(kubectl get pods -n hanzo -o name | grep bot-gateway | head -1 | sed 's|pod/||')
          echo "=== First 50 log lines (startup) ==="
          kubectl logs "$GW_POD" -n hanzo 2>&1 | head -50
